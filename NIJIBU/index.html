<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nipe Jibu — Msaada wa Kitaaluma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cover:#0F6E56; --cover-dark:#085041; --accent:#D85A30; --accent-dark:#993C1D;
    --paper-line:#C9D3D9; --margin-red:#C2453A; --ink:#262421; --ink-soft:#5b5850; --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; font-family:'IBM Plex Sans', sans-serif; color:#fff; background:var(--cover); line-height:1.6;}
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  a{color:inherit;}
  :focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  img,svg{display:block;}

  header.nav{
    position:sticky; top:0; z-index:50; background:var(--cover-dark);
    border-bottom:1px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:space-between; padding:14px 6vw; gap:16px;
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:600; font-size:19px; font-family:'Fraunces',serif; color:#fff;}
  .brand svg{width:32px; height:32px;}
  nav.links{display:flex; gap:24px; font-size:14px; flex:1;}
  nav.links a{text-decoration:none; color:rgba(255,255,255,0.75);}
  nav.links a:hover{color:#fff;}
  .nav-right{display:flex; align-items:center; gap:14px;}
  .lang-toggle{display:flex; background:rgba(255,255,255,0.12); border-radius:20px; padding:3px;}
  .lang-btn{
    background:none; border:none; color:rgba(255,255,255,0.7); font-size:12.5px; font-weight:600;
    padding:5px 12px; border-radius:16px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .lang-btn.active{background:#fff; color:var(--cover);}
  .nav-cta{
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .nav-cta:hover{background:var(--accent-dark);}
  @media (max-width:720px){ nav.links{display:none;} }

  section.hero{padding:64px 6vw 80px; position:relative; overflow:hidden;}
  .hero-inner{max-width:760px; margin:0 auto; position:relative; z-index:2;}
  .cover-label{
    display:inline-block; border:1.5px solid rgba(255,255,255,0.5); border-radius:6px;
    padding:4px 12px; font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    margin-bottom:20px; color:rgba(255,255,255,0.85);
  }
  .hero h1{font-size:clamp(34px,6vw,54px); line-height:1.12; margin-bottom:16px;}
  .hero p.tagline{font-size:18px; color:rgba(255,255,255,0.88); max-width:520px; margin-bottom:32px;}
  .hero-fields{display:flex; gap:24px; flex-wrap:wrap; margin-bottom:32px; font-size:14px; color:rgba(255,255,255,0.75);}
  .hero-fields div{border-bottom:1px dashed rgba(255,255,255,0.4); padding-bottom:4px; min-width:160px;}
  .cta-row{display:flex; gap:14px; flex-wrap:wrap;}
  .btn-primary{
    background:var(--accent); color:#fff; border:none; border-radius:8px; padding:14px 26px;
    font-size:15px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{
    background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,0.6); border-radius:8px;
    padding:14px 26px; font-size:15px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .btn-ghost:hover{background:rgba(255,255,255,0.1);}
  .stitch{
    position:absolute; left:0; top:0; bottom:0; width:26px;
    background-image:repeating-linear-gradient(to bottom, rgba(255,255,255,0.35) 0 3px, transparent 3px 16px);
    opacity:0.5;
  }

  .trust{background:var(--card); border-bottom:1px solid var(--paper-line); padding:16px 6vw; text-align:center; font-size:13px; color:var(--ink-soft);}
  .trust b{color:var(--ink);}

  section.ruled{
    background-image: repeating-linear-gradient(to bottom, transparent 0 39px, rgba(255,255,255,0.18) 39px 40px);
    padding:64px 6vw; position:relative;
  }
  section.ruled::before{
    content:""; position:absolute; top:0; bottom:0; left:calc(6vw + 46px); width:1.5px;
    background:var(--margin-red); opacity:0.75;
  }
  .section-inner{max-width:960px; margin:0 auto; position:relative; z-index:1;}
  .eyebrow{font-size:13px; letter-spacing:0.06em; text-transform:uppercase; color:#FFD9C4; font-weight:600; margin-bottom:10px;}
  h2.section-title{font-size:clamp(26px,4vw,34px); margin-bottom:36px; color:#fff;}

  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
  @media (max-width:760px){ .steps{grid-template-columns:1fr;} }
  .step{background:var(--card); border:1px solid var(--paper-line); border-radius:12px; padding:24px; color:var(--ink);}
  .step .num{font-family:'Fraunces',serif; font-size:28px; color:var(--cover); font-weight:600; margin-bottom:10px;}
  .step h3{font-size:17px; margin-bottom:8px;}
  .step p{font-size:14px; color:var(--ink-soft); margin:0;}

  .price-card{
    background:var(--card); border:1px solid var(--paper-line); border-radius:14px;
    max-width:420px; padding:32px; box-shadow:0 1px 0 var(--paper-line); color:var(--ink);
  }
  .price-card .amount{font-family:'Fraunces',serif; font-size:40px; color:var(--cover); margin-bottom:4px;}
  .price-card .amount span{font-size:16px; color:var(--ink-soft); font-family:'IBM Plex Sans',sans-serif;}
  .price-card ul{list-style:none; padding:0; margin:20px 0; font-size:14px;}
  .price-card li{padding:6px 0; display:flex; gap:10px;}
  .price-card li.no{color:var(--ink-soft);}
  .tick{color:var(--cover); font-weight:600;}
  .cross{color:var(--accent); font-weight:600;}
  .disclaimer{background:#F1EFE8; border-left:3px solid var(--accent); border-radius:6px; padding:12px 14px; font-size:13px; color:var(--ink-soft); margin-top:18px;}

  .faq-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:20px;}
  @media (max-width:760px){ .faq-grid{grid-template-columns:1fr;} }
  .note{padding:20px; border-radius:4px; font-size:14px; cursor:pointer; box-shadow:2px 3px 6px rgba(0,0,0,0.08); color:var(--ink);}
  .note h3{font-size:15px; margin-bottom:8px; font-family:'IBM Plex Sans',sans-serif; font-weight:600;}
  .note p{margin:0; color:var(--ink-soft); display:none;}
  .note.open p{display:block;}
  .note:nth-child(1){background:#DDEFE8; transform:rotate(-1deg);}
  .note:nth-child(2){background:#FBE3D8; transform:rotate(1deg);}
  .note:nth-child(3){background:#F1EFE0; transform:rotate(-0.6deg);}
  .note:nth-child(4){background:#E4ECF1; transform:rotate(0.8deg);}

  footer{background:var(--cover-dark); color:rgba(255,255,255,0.85); padding:48px 6vw 32px; font-size:14px;}
  footer .foot-grid{display:flex; justify-content:space-between; flex-wrap:wrap; gap:24px; max-width:960px; margin:0 auto 24px;}
  footer h4{font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:#fff; margin-bottom:10px;}
  footer .foot-note{max-width:960px; margin:0 auto; border-top:1px solid rgba(255,255,255,0.15); padding-top:20px; font-size:12.5px; color:rgba(255,255,255,0.65);}

  .chat-launcher{
    position:fixed; bottom:22px; right:22px; width:56px; height:56px; border-radius:50%;
    background:var(--cover); border:none; cursor:pointer; z-index:100;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .chat-launcher svg{width:28px; height:28px;}
  .chat-panel{
    position:fixed; bottom:88px; right:22px; width:320px; max-height:70vh; background:#FDF6E3;
    border-radius:6px; box-shadow:4px 6px 16px rgba(0,0,0,0.2); transform:rotate(-0.4deg);
    display:none; flex-direction:column; z-index:100; border:1px solid #E9DFC0;
  }
  .chat-panel.open{display:flex;}
  .chat-head{background:var(--cover); color:#fff; padding:12px 14px; border-radius:6px 6px 0 0; display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:600;}
  .chat-head button{background:none; border:none; color:#fff; font-size:18px; cursor:pointer; line-height:1;}
  .chat-body{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; font-size:13.5px; color:var(--ink);}
  .msg{padding:8px 12px; border-radius:10px; max-width:85%;}
  .msg.bot{background:#fff; align-self:flex-start; border:1px solid #E9DFC0;}
  .msg.user{background:var(--cover); color:#fff; align-self:flex-end;}
  .quick-replies{display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 10px;}
  .quick-replies button{background:#fff; border:1px solid #E9DFC0; border-radius:14px; padding:6px 12px; font-size:12.5px; cursor:pointer; color:var(--ink);}
  .quick-replies button:hover{background:#F1EFE0;}
  .chat-input{display:flex; gap:8px; padding:10px; border-top:1px solid #E9DFC0;}
  .chat-input input{flex:1; border:1px solid #E9DFC0; border-radius:8px; padding:8px 10px; font-size:13px; font-family:'IBM Plex Sans',sans-serif;}
  .chat-input button{background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; font-weight:600;}
  @media (max-width:420px){ .chat-panel{width:90vw; right:5vw;} }
</style>
</head>
<body>

<header class="nav">
  <div class="brand">
    <svg viewBox="0 0 56 56" aria-hidden="true"><rect width="56" height="56" rx="14" fill="#0F6E56"/><rect x="12" y="12" width="32" height="24" rx="8" fill="none" stroke="#fff" stroke-width="3"/><path d="M20 36 L20 45 L29 36" fill="#fff"/><path d="M19 24 L25 30 L37 17" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Nipe Jibu
  </div>
  <nav class="links">
    <a href="#jinsi" data-i18n="nav_link_how"></a>
    <a href="#bei" data-i18n="nav_link_price"></a>
    <a href="#maswali" data-i18n="nav_link_faq"></a>
  </nav>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn" id="langBtnSw" onclick="setLang('sw')">SW</button>
      <button class="lang-btn active" id="langBtnEn" onclick="setLang('en')">EN</button>
    </div>
    <button class="nav-cta" data-i18n="nav_cta" onclick="document.getElementById('jinsi').scrollIntoView()"></button>
  </div>
</header>

<section class="hero">
  <div class="stitch" aria-hidden="true"></div>
  <div class="hero-inner">
    <span class="cover-label" data-i18n="hero_label"></span>
    <h1 data-i18n="hero_h1"></h1>
    <p class="tagline" data-i18n="hero_tagline"></p>
    <div class="hero-fields">
      <div data-i18n="hero_field_name"></div>
      <div data-i18n="hero_field_chuo"></div>
      <div data-i18n="hero_field_somo"></div>
    </div>
    <div class="cta-row">
      <button class="btn-primary" data-i18n="cta_start" onclick="document.getElementById('jinsi').scrollIntoView()"></button>
      <button class="btn-ghost" data-i18n="cta_price" onclick="document.getElementById('bei').scrollIntoView()"></button>
    </div>
  </div>
</section>

<div class="trust" data-i18n="trust_text"></div>

<section class="ruled" id="jinsi">
  <div class="section-inner">
    <div class="eyebrow" data-i18n="eyebrow_how"></div>
    <h2 class="section-title" data-i18n="title_how"></h2>
    <div class="steps">
      <div class="step">
        <div class="num">1</div>
        <h3 data-i18n="step1_title"></h3>
        <p data-i18n="step1_desc"></p>
      </div>
      <div class="step">
        <div class="num">2</div>
        <h3 data-i18n="step2_title"></h3>
        <p data-i18n="step2_desc"></p>
      </div>
      <div class="step">
        <div class="num">3</div>
        <h3 data-i18n="step3_title"></h3>
        <p data-i18n="step3_desc"></p>
      </div>
    </div>
  </div>
</section>

<section class="ruled" id="bei">
  <div class="section-inner">
    <div class="eyebrow" data-i18n="eyebrow_price"></div>
    <h2 class="section-title" data-i18n="title_price"></h2>
    <div class="price-card">
      <div class="amount">TZS 1,000 <span>&ndash; 5,000</span></div>
      <div style="font-size:13px; color:var(--ink-soft);" data-i18n="price_note"></div>
      <ul>
        <li><span class="tick">&#10003;</span><span data-i18n="price_li1"></span></li>
        <li><span class="tick">&#10003;</span><span data-i18n="price_li2"></span></li>
        <li><span class="tick">&#10003;</span><span data-i18n="price_li3"></span></li>
        <li class="no"><span class="cross">&times;</span><span data-i18n="price_li4"></span></li>
      </ul>
      <button class="btn-primary" style="width:100%;" data-i18n="price_btn" onclick="document.getElementById('jinsi').scrollIntoView()"></button>
      <div class="disclaimer" data-i18n="disclaimer_price"></div>
    </div>
  </div>
</section>

<section class="ruled" id="maswali">
  <div class="section-inner">
    <div class="eyebrow" data-i18n="eyebrow_faq"></div>
    <h2 class="section-title" data-i18n="title_faq"></h2>
    <div class="faq-grid">
      <div class="note" onclick="this.classList.toggle('open')">
        <h3 data-i18n="faq1_q"></h3>
        <p data-i18n="faq1_a"></p>
      </div>
      <div class="note" onclick="this.classList.toggle('open')">
        <h3 data-i18n="faq2_q"></h3>
        <p data-i18n="faq2_a"></p>
      </div>
      <div class="note" onclick="this.classList.toggle('open')">
        <h3 data-i18n="faq3_q"></h3>
        <p data-i18n="faq3_a"></p>
      </div>
      <div class="note" onclick="this.classList.toggle('open')">
        <h3 data-i18n="faq4_q"></h3>
        <p data-i18n="faq4_a"></p>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="foot-grid">
    <div>
      <h4>Nipe Jibu</h4>
      <div style="max-width:260px; color:rgba(255,255,255,0.7);" data-i18n="footer_desc"></div>
    </div>
    <div>
      <h4 data-i18n="footer_contact_label"></h4>
      <div style="color:rgba(255,255,255,0.7);">WhatsApp: +255 753 838 827</div>
    </div>
    <div>
      <h4 data-i18n="footer_links_label"></h4>
      <div style="display:flex; flex-direction:column; gap:6px; color:rgba(255,255,255,0.7);">
        <a href="#jinsi" data-i18n="nav_link_how"></a>
        <a href="#bei" data-i18n="nav_link_price"></a>
        <a href="#maswali" data-i18n="nav_link_faq"></a>
      </div>
    </div>
  </div>
  <div class="foot-note" data-i18n="footer_note"></div>
</footer>

<button class="chat-launcher" onclick="document.getElementById('chatPanel').classList.toggle('open')" aria-label="Chat">
  <svg viewBox="0 0 56 56" aria-hidden="true"><rect x="12" y="12" width="32" height="24" rx="8" fill="none" stroke="#fff" stroke-width="3"/><path d="M20 36 L20 45 L29 36" fill="#fff"/><path d="M19 24 L25 30 L37 17" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<div class="chat-panel" id="chatPanel">
  <div class="chat-head">
    <span data-i18n="chat_head_title"></span>
    <button onclick="document.getElementById('chatPanel').classList.remove('open')" aria-label="Close">&times;</button>
  </div>
  <div class="chat-body" id="chatBody"></div>
  <div class="quick-replies">
    <button onclick="askPreset('pricing')" data-i18n="chat_preset_price"></button>
    <button onclick="askPreset('timing')" data-i18n="chat_preset_time"></button>
    <button onclick="askPreset('writeforme')" data-i18n="chat_preset_write"></button>
  </div>
  <div class="chat-input">
    <input type="text" id="chatInput" data-i18n-ph="chat_input_placeholder" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()" data-i18n="chat_send_btn"></button>
  </div>
</div>

let currentLang = "sw";

function setLang(lang){
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = translations[lang][el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = translations[lang][el.dataset.i18nPh];
  });
  document.getElementById('langBtnSw').classList.toggle('active', lang === 'sw');
  document.getElementById('langBtnEn').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang;
}

function addMsg(text, who){
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function detectIntent(userText){
  const t = userText.toLowerCase();
  if (t.includes('bei') || t.includes('gharama') || t.includes('lipa') || t.includes('price') || t.includes('cost') || t.includes('pay')) return 'pricing';
  if (t.includes('muda') || t.includes('lini') || t.includes('haraka') || t.includes('long') || t.includes('time') || t.includes('when')) return 'timing';
  if (t.includes('andik') || t.includes('kamilish') || t.includes('fanyi') || t.includes('write') || t.includes('complete') || t.includes('do it')) return 'writeforme';
  if (t.includes('whatsapp') || t.includes('wasiliana') || t.includes('contact')) return 'whatsapp';
  return 'fallback';
}

function botReply(userText){
  const intent = detectIntent(userText);
  const key = 'chat_reply_' + intent;
  setTimeout(() => addMsg(translations[currentLang][key], 'bot'), 400);
}

function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  addMsg(text, 'user');
  botReply(text);
  input.value = '';
}

function askPreset(key){
  const text = translations[currentLang]['chat_preset_' + (key === 'pricing' ? 'price' : key === 'timing' ? 'time' : 'write')];
  addMsg(text, 'user');
  botReply(text);
}

setLang('en');
addMsg(translations['en'].chat_greeting, 'bot');
</script>
